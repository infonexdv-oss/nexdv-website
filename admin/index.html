<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexDV Admin Login</title>
    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../supabase-config.js"></script>
    <link rel="icon" href="https://i.ibb.co/qLVD2YWg/d7bf73944e81.png" type="image/png">
</head>
<body>
    <div class="login-container">
        <div style="text-align: center; margin-bottom: 15px;">
            <img src="https://i.ibb.co/qLVD2YWg/d7bf73944e81.png" alt="NexDV Logo" style="height: 50px; filter: brightness(0) invert(1);">
        </div>
        <h2 style="margin-top: 0;">Admin Login</h2>
        <form id="login-form">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group" style="position: relative;">
                <label>Password</label>
                <div style="position: relative;">
                    <input type="password" id="password" required style="padding-right: 40px; width: 100%;">
                    <button type="button" id="toggle-password" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-dim); cursor: pointer; display: flex; align-items: center; justify-content: center;">
                        <i data-lucide="eye-off" style="width: 20px; height: 20px;"></i>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn">Login</button>
            <p id="error-msg" style="color: var(--danger); margin-top: 15px; display: none;"></p>
        </form>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        lucide.createIcons();

        // Password Toggle
        const toggleBtn = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');
        toggleBtn.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            toggleBtn.innerHTML = `<i data-lucide="${type === 'password' ? 'eye-off' : 'eye'}"></i>`;
            lucide.createIcons();
        });

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = passwordInput.value;
            const errorMsg = document.getElementById('error-msg');
            const loginBtn = document.querySelector('button[type="submit"]');
            
            if (!window.supabaseClient) {
                errorMsg.textContent = "Supabase not loaded. Check connection.";
                errorMsg.style.display = 'block';
                return;
            }

            // Show loading animation
            const originalBtnText = loginBtn.innerHTML;
            loginBtn.innerHTML = '<i data-lucide="loader-2" class="spin" style="width: 18px; height: 18px; margin-right: 8px; vertical-align: middle;"></i> <span style="vertical-align: middle;">Logging in...</span>';
            loginBtn.style.pointerEvents = 'none';
            loginBtn.style.opacity = '0.8';
            lucide.createIcons();

            const { data, error } = await window.supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
                // Restore button
                loginBtn.innerHTML = originalBtnText;
                loginBtn.style.pointerEvents = 'auto';
                loginBtn.style.opacity = '1';
            } else {
                loginBtn.innerHTML = '<i data-lucide="check-circle" style="width: 18px; height: 18px; margin-right: 8px; vertical-align: middle;"></i> <span style="vertical-align: middle;">Success</span>';
                loginBtn.style.background = '#10b981'; // Success color
                lucide.createIcons();
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 600);
            }
        });

        // Check if already logged in
        if (window.supabaseClient) {
            window.supabaseClient.auth.getSession().then(({ data: { session } }) => {
                if (session) {
                    window.location.href = 'dashboard.html';
                }
            });
        }
    </script>
</body>
</html>
